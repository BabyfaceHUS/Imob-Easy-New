<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    html, body, #root { height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background: #fafaf8; color: #111827; }
    #root { display: flex; flex-direction: column; }

    .leaflet-control-attribution { display: none !important; }
    .marker-cluster, .marker-cluster div { background: transparent !important; border: none !important; }

    .scr::-webkit-scrollbar { width: 3px; }
    .scr::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }

    @keyframes fadeIn  { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { transform: translateY(28px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
    @keyframes spin    { to { transform: rotate(360deg) } }

    .card {
      background: white; border-radius: 16px; overflow: hidden;
      border: 1.5px solid #f3f4f6; margin-bottom: 12px; cursor: pointer;
      transition: transform .18s, box-shadow .18s, border-color .18s;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active { transform: scale(.98); }
    .card.active { border-color: #FF6A3D; box-shadow: 0 0 0 3px rgba(255,106,61,.14); }

    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      z-index: 3000; display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn .18s ease;
    }
    @media(min-width:600px){ .overlay { align-items: center; padding: 20px; } }

    .mbox {
      background: white; width: 100%; max-width: 560px; max-height: 96vh;
      overflow-y: auto; border-radius: 24px 24px 0 0;
      animation: slideUp .24s cubic-bezier(.32,.72,0,1);

    @media(min-width:600px){ .mbox { border-radius: 24px; max-height: 92vh; } }

    .inp {
      width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb;
      border-radius: 10px; font-size: 14px; font-family: 'Plus Jakarta Sans', sans-serif;

    }
    .inp:focus { border-color: #FF6A3D; }

      padding: 13px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      transition: background .18s; -webkit-tap-highlight-color: transparent;
    }
    .btn-p:active { background: #e55a30; }
    .btn-s {
      background: #f3f4f6; color: #374151; border: none; border-radius: 12px;
      padding: 13px 20px; font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: inline-flex; align-items: center; justify-content: center;
    }

    .bsheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-radius: 22px 22px 0 0;
      box-shadow: 0 -4px 40px rgba(0,0,0,.14);
      z-index: 500; display: flex; flex-direction: column;
      will-change: transform;
    }

    .pill-btn { padding: 6px 16px; border-radius: 24px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; gap: 5px; transition: all .2s; }
    .pill-btn.on  { background: #111827; color: white; }
    .pill-btn.off { background: transparent; color: #6b7280; }

    .mtog-btn.on  { background: white; color: #111827; }
    .mtog-btn.off { background: transparent; color: rgba(255,255,255,.6); }

    .spin   { width:18px; height:18px; border:2px solid #FF6A3D; border-top-color:transparent; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
    .spin-w { width:16px; height:16px; border:2px solid white;   border-top-color:transparent; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }

       z-index 600 = acima do mapa (200) mas abaixo do bottom-sheet (500)
       e muito abaixo dos modais (3000).
       No desktop fica à esquerda da sidebar, não sobre ela.         */
    .ls-legend {

      right: 12px;
      z-index: 600;
      background: rgba(255,255,255,.97);

      border-radius: 14px;
      padding: 13px 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
      min-width: 175px;

      pointer-events: none; /* não bloqueia cliques no mapa */
    }
  </style>

/* ══════════════════════════════════════
   SUPABASE OPS
   ══════════════════════════════════════ */
async function fetchByBounds(bounds, filters) {
  if (!bounds) return [];
  let q = sb.from('properties')
    .select('id,title,type,price,area,rooms,bathrooms,latitude,longitude,neighborhood,images,broker_name,broker_phone,broker_avatar,description')
    .gte('latitude', bounds.latMin).lte('latitude', bounds.latMax)
    .gte('longitude',bounds.lngMin).lte('longitude',bounds.lngMax)
    .limit(500);
  if (filters.type !== 'all') q = q.eq('type', filters.type);
  if (filters.maxPrice < MAX_PRICE) q = q.lte('price', filters.maxPrice);
  const { data, error } = await q;
  if (error) { console.error(error); return []; }
  return data ?? [];
}

async function insertProperty(payload) {
  const { data, error } = await sb.from('properties').insert([payload]).select().single();
  if (error) throw error;
  return data;
}

/* ══════════════════════════════════════
   HEATMAP CANVAS
   ══════════════════════════════════════ */
function buildHeatLayer(groups) {
  return L.Layer.extend({
    initialize() { this._groups = groups; this._raf = null; },
    onAdd(map) {
      this._map = map;
      const c = document.createElement('canvas');
      c.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:200;';
      this._c = c;
      map.getPanes().overlayPane.appendChild(c);
      map.on('moveend zoomend resize', this._go, this);
      this._go();
    },
    onRemove(map) { this._c.remove(); map.off('moveend zoomend resize', this._go, this); },
    _go() { if(this._raf) cancelAnimationFrame(this._raf); this._raf = requestAnimationFrame(()=>this._draw()); },
    _draw() {
      const map=this._map, sz=map.getSize(), c=this._c;
      c.width=sz.x; c.height=sz.y;
      L.DomUtil.setPosition(c, map.containerPointToLayerPoint([0,0]));
      const ctx=c.getContext('2d');
      ctx.clearRect(0,0,sz.x,sz.y);
      const r=Math.max(25,Math.min(380,80*Math.pow(2,map.getZoom()-12)));
      this._groups.forEach(({pois,rgb})=>{
        const off=document.createElement('canvas'); off.width=sz.x; off.height=sz.y;
        const oc=off.getContext('2d');
        pois.forEach(({lat,lng})=>{
          const pt=map.latLngToContainerPoint([lat,lng]);
          if(pt.x<-r||pt.x>sz.x+r||pt.y<-r||pt.y>sz.y+r) return;
          const g=oc.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,r);
          g.addColorStop(0,   `rgba(${rgb},0.38)`);
          g.addColorStop(0.35,`rgba(${rgb},0.18)`);
          g.addColorStop(0.7, `rgba(${rgb},0.05)`);
          g.addColorStop(1,   `rgba(${rgb},0)`);
          oc.globalCompositeOperation='source-over';
          oc.beginPath(); oc.arc(pt.x,pt.y,r,0,Math.PI*2); oc.fillStyle=g; oc.fill();
        });
        ctx.globalCompositeOperation='screen'; ctx.globalAlpha=0.85; ctx.drawImage(off,0,0);
      });
      ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
    },
  });
}

/* ══════════════════════════════════════
   ADD FORM
   FIX BUG 2: componente definido FORA do
   App e set() memoizado com useCallback.
   Isso impede que o componente seja
   recriado a cada keystroke, eliminando
   a perda de foco nos inputs.
   ══════════════════════════════════════ */
function AddForm({ onClose, onSaved }) {
  const [form, setForm] = useState({
    title:'', type:'apartamento', price:'', area:'',
    rooms:'', bathrooms:'', neighborhood:'', description:'',
    latitude:String(MAP_CENTER[0]), longitude:String(MAP_CENTER[1]),
    broker_name:'', broker_phone:'',
  });
  const [step,   setStep]   = useState(1);
  const [saving, setSaving] = useState(false);
  const [err,    setErr]    = useState('');
  const miniRef  = useRef(null);
  const miniInst = useRef(null);

  /* set() estável — não causa re-render desnecessário */
  const set = useCallback(k => e => {
    const v = e.target.value;
    setForm(prev => ({ ...prev, [k]: v }));
  }, []);

  /* Mini-mapa só inicializa ao ir para o passo 2 */
  useEffect(() => {
    if (step!==2||!miniRef.current||miniInst.current) return;
    const lat = parseFloat(form.latitude)||MAP_CENTER[0];
    const lng = parseFloat(form.longitude)||MAP_CENTER[1];
    const map = L.map(miniRef.current,{center:[lat,lng],zoom:13});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
    const mk = L.marker([lat,lng],{draggable:true}).addTo(map);
    mk.on('dragend',()=>{const p=mk.getLatLng(); setForm(prev=>({...prev,latitude:p.lat.toFixed(6),longitude:p.lng.toFixed(6)}));});
    map.on('click',e=>{mk.setLatLng(e.latlng); setForm(prev=>({...prev,latitude:e.latlng.lat.toFixed(6),longitude:e.latlng.lng.toFixed(6)}));});
    miniInst.current = map;
    return () => { map.remove(); miniInst.current=null; };
  }, [step]);

  useEffect(()=>{
    const fn = e=>{if(e.key==='Escape')onClose();};
    document.addEventListener('keydown',fn);
    return ()=>document.removeEventListener('keydown',fn);
  },[]);

  async function submit() {
    if (!form.title.trim()||!form.price){setErr('Preencha Título e Preço.');return;}
    setSaving(true); setErr('');
    try {
      const saved = await insertProperty({
        title:form.title, type:form.type,
        price:parseFloat(form.price)||0,
        area:parseInt(form.area)||null,
        rooms:parseInt(form.rooms)||null,
        bathrooms:parseInt(form.bathrooms)||null,
        latitude:parseFloat(form.latitude)||MAP_CENTER[0],
        longitude:parseFloat(form.longitude)||MAP_CENTER[1],
        neighborhood:form.neighborhood||null,
        description:form.description||null,
        broker_name:form.broker_name||null,
        broker_phone:form.broker_phone||null,
        broker_avatar:(form.broker_name||'CO').slice(0,2).toUpperCase(),
        images:['https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800&q=75'],
      });
      onSaved(saved);
    } catch(e) {
      setErr(e.message||'Erro ao salvar.');
    } finally { setSaving(false); }
  }

  const Lbl = ({children}) => <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:4}}>{children}</label>;

  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="mbox">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'20px 20px 0'}}>
          <div>
            <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:19,fontWeight:700}}>Cadastrar Imóvel</h2>
            <p style={{fontSize:12,color:'#9ca3af',marginTop:2}}>Passo {step} de 2 — {step===1?'Informações':'Localização'}</p>
          </div>
          <button onClick={onClose} style={{background:'#f3f4f6',border:'none',borderRadius:'50%',width:34,height:34,fontSize:20,cursor:'pointer'}}>×</button>
        </div>
        <div style={{height:3,background:'#f3f4f6',margin:'12px 20px 16px'}}>
          <div style={{height:'100%',background:ACCENT,borderRadius:2,width:step===1?'50%':'100%',transition:'width .3s'}}/>
        </div>

        <div style={{padding:'0 20px 28px',maxHeight:'72vh',overflowY:'auto'}} className="scr">
          {step===1&&(
            <>
              <div style={{marginBottom:12}}>
                <Lbl>Tipo de imóvel</Lbl>
                <div style={{display:'flex',gap:8}}>
                  {[{v:'apartamento',l:'🏢 Apartamento'},{v:'casa',l:'🏠 Casa'}].map(({v,l})=>(
                    <button key={v} onClick={()=>setForm(prev=>({...prev,type:v}))}
                      style={{flex:1,padding:10,borderRadius:10,border:`1.5px solid ${form.type===v?ACCENT:'#e5e7eb'}`,background:form.type===v?'#fff7f4':'white',color:form.type===v?ACCENT:'#374151',fontWeight:600,fontSize:14,cursor:'pointer',fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>

              {/* Campos individuais — cada um tem seu próprio onChange estável */}
              <div style={{marginBottom:12}}><Lbl>Título *</Lbl><input type="text" className="inp" placeholder="Ex: Apartamento 3 quartos Calhau" value={form.title} onChange={set('title')}/></div>
              <div style={{marginBottom:12}}><Lbl>Preço (R$) *</Lbl><input type="number" className="inp" placeholder="Ex: 650000" value={form.price} onChange={set('price')}/></div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:12}}>
                <div><Lbl>Quartos</Lbl><input type="number" className="inp" placeholder="3" value={form.rooms} onChange={set('rooms')}/></div>
                <div><Lbl>Banheiros</Lbl><input type="number" className="inp" placeholder="2" value={form.bathrooms} onChange={set('bathrooms')}/></div>
                <div><Lbl>Área m²</Lbl><input type="number" className="inp" placeholder="85" value={form.area} onChange={set('area')}/></div>
              </div>

              <div style={{marginBottom:12}}><Lbl>Bairro</Lbl><input type="text" className="inp" placeholder="Ex: Calhau" value={form.neighborhood} onChange={set('neighborhood')}/></div>
              <div style={{marginBottom:12}}><Lbl>Descrição</Lbl><textarea className="inp" rows={3} placeholder="Descreva o imóvel…" value={form.description} onChange={set('description')} style={{resize:'vertical'}}/></div>
              <div style={{marginBottom:12}}><Lbl>Seu nome</Lbl><input type="text" className="inp" placeholder="Nome do Corretor" value={form.broker_name} onChange={set('broker_name')}/></div>
              <div style={{marginBottom:16}}><Lbl>WhatsApp</Lbl><input type="tel" className="inp" placeholder="(98) 99999-9999" value={form.broker_phone} onChange={set('broker_phone')}/></div>

              <button className="btn-p" onClick={()=>setStep(2)} style={{width:'100%',padding:13}}>Próximo: Localização →</button>
            </>
          )}

          {step===2&&(
            <>
              <p style={{fontSize:13,color:'#6b7280',marginBottom:10}}>Clique no mapa ou arraste o marcador para posicionar o imóvel.</p>
              <div ref={miniRef} style={{height:250,borderRadius:12,overflow:'hidden',border:'1.5px solid #e5e7eb',marginBottom:12}}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
                <div><Lbl>Latitude</Lbl><input type="text" className="inp" value={form.latitude} onChange={set('latitude')} style={{fontFamily:'monospace',fontSize:13}}/></div>
                <div><Lbl>Longitude</Lbl><input type="text" className="inp" value={form.longitude} onChange={set('longitude')} style={{fontFamily:'monospace',fontSize:13}}/></div>
              </div>
              {err&&<p style={{fontSize:13,color:'#ef4444',background:'#fef2f2',borderRadius:8,padding:'8px 12px',marginBottom:12}}>⚠️ {err}</p>}
              <div style={{display:'flex',gap:10}}>
                <button className="btn-s" onClick={()=>setStep(1)} style={{flex:1,padding:13}}>← Voltar</button>
                <button className="btn-p" onClick={submit} disabled={saving} style={{flex:2,padding:13,opacity:saving?.6:1}}>
                  {saving?<><span className="spin-w"/>Salvando…</>:'✓ Cadastrar Imóvel'}
                </button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   BOTTOM SHEET
   ══════════════════════════════════════ */
function BottomSheet({ items, activeId, onSelect, filters, setFilters }) {
  const snaps = useCallback(()=>({full:0,half:window.innerHeight*.44,collapsed:window.innerHeight-80}),[]);
  const [snap, setSnap]   = useState('half');
  const [dragY,setDragY]  = useState(null);
  const startTY=useRef(null), startPos=useRef(null), dragging=useRef(false);
  const ty=dragY!==null?dragY:snaps()[snap];
  const tr=dragY!==null?'none':'transform .36s cubic-bezier(.32,.72,0,1)';
  const collapsed=snap==='collapsed'&&dragY===null;
  const onTS=e=>{startTY.current=e.touches[0].clientY;startPos.current=ty;dragging.current=true;};
  const onTM=e=>{if(!dragging.current)return;const s=snaps();setDragY(Math.max(0,Math.min(s.collapsed,startPos.current+(e.touches[0].clientY-startTY.current))));};
  const onTE=()=>{if(!dragging.current)return;dragging.current=false;const cur=dragY??snaps()[snap];const s=snaps();const n=Object.entries(s).sort((a,b)=>Math.abs(a[1]-cur)-Math.abs(b[1]-cur))[0][0];setDragY(null);setSnap(n);};
  return (
    <div className="bsheet" style={{height:'100%',transform:`translateY(${ty}px)`,transition:tr}}>
      <div style={{padding:'12px 0 4px',cursor:'grab',userSelect:'none',flexShrink:0}} onClick={()=>{if(snap==='collapsed')setSnap('half');}} onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}>
        <div style={{width:38,height:5,background:'#d1d5db',borderRadius:3,margin:'0 auto'}}/>
      </div>
      <div style={{padding:'0 16px 12px',borderBottom:'1px solid #f3f4f6',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <p style={{fontSize:14,fontWeight:700}}>{items.length} imóveis</p>
          <div style={{display:'flex',gap:6}}>
            {[{v:'all',l:'Todos'},{v:'apartamento',l:'Apto'},{v:'casa',l:'Casa'}].map(({v,l})=>(
              <button key={v} className="fpill" onClick={()=>setFilters(f=>({...f,type:v}))}
                style={{background:filters.type===v?ACCENT:'white',borderColor:filters.type===v?ACCENT:'#e5e7eb',color:filters.type===v?'white':'#374151'}}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:11,color:'#9ca3af',whiteSpace:'nowrap'}}>Até:</span>
          <input type="range" min={150_000} max={MAX_PRICE} step={50_000} value={Math.min(filters.maxPrice,MAX_PRICE)} onChange={e=>setFilters(f=>({...f,maxPrice:parseInt(e.target.value)}))} style={{flex:1}}/>
          <span style={{fontSize:11,fontWeight:700,color:ACCENT,minWidth:44,textAlign:'right'}}>{filters.maxPrice>=MAX_PRICE?'Todos':fmtShort(filters.maxPrice)}</span>
        </div>
      </div>
      <div className="scr" style={{flex:1,overflowY:collapsed?'hidden':'auto',padding:'12px 14px 120px',WebkitOverflowScrolling:'touch',overscrollBehavior:'contain'}}>
        {items.slice(0,50).map(p=><PropCard key={p.id} p={p} active={p.id===activeId} onClick={()=>{onSelect(p);setSnap('collapsed');}}/>)}
        {items.length>50&&<p style={{fontSize:12,color:'#9ca3af',textAlign:'center',padding:'10px 0'}}>Mostrando 50 de {items.length}. Refine os filtros.</p>}
        {items.length===0&&<div style={{textAlign:'center',padding:'48px 20px',color:'#9ca3af'}}><p style={{fontSize:32,marginBottom:10}}>🏚</p><p style={{fontWeight:600,color:'#6b7280',fontSize:14}}>Nenhum imóvel encontrado</p></div>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   APP
   ══════════════════════════════════════ */
function App() {
  const [properties,setProperties]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filters,setFilters]=useState({type:'all',maxPrice:MAX_PRICE});
  const [viewMode,setViewMode]=useState('mapa');
  const [userMode,setUserMode]=useState('comprador');
  const [activeId,setActiveId]=useState(null);
  const [selected,setSelected]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [isMobile,setIsMobile]=useState(()=>window.innerWidth<768);
  const [bounds,setBounds]=useState(null);
  const mapRef=useRef(null),mapInst=useRef(null),clusterRef=useRef(null),heatRef=useRef(null),timerRef=useRef(null),cacheRef=useRef({}),sidebarRef=useRef(null);

  useEffect(()=>{const fn=()=>setIsMobile(window.innerWidth<768);window.addEventListener('resize',fn);return()=>window.removeEventListener('resize',fn);},[]);

  useEffect(()=>{
    if(mapInst.current||!mapRef.current)return;
    const map=L.map(mapRef.current,{center:MAP_CENTER,zoom:MAP_ZOOM,zoomControl:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
    L.control.zoom({position:'bottomright'}).addTo(map);
    const update=()=>{const b=map.getBounds();setBounds({latMin:b.getSouth(),latMax:b.getNorth(),lngMin:b.getWest(),lngMax:b.getEast()});};
    update(); map.on('moveend zoomend',update); mapInst.current=map;
    return()=>{map.remove();mapInst.current=null;};
  },[]);

  useEffect(()=>{
    if(!bounds)return;
    const key=`${bounds.latMin.toFixed(2)},${bounds.latMax.toFixed(2)},${bounds.lngMin.toFixed(2)},${bounds.lngMax.toFixed(2)},${filters.type},${filters.maxPrice}`;
    if(cacheRef.current[key]){setProperties(cacheRef.current[key]);setLoading(false);return;}
    clearTimeout(timerRef.current);
    timerRef.current=setTimeout(async()=>{
      setLoading(true);
      const data=await fetchByBounds(bounds,filters);
      cacheRef.current[key]=data; setProperties(data); setLoading(false);
    },400);
    return()=>clearTimeout(timerRef.current);
  },[bounds,filters]);

  useEffect(()=>{
    const map=mapInst.current;if(!map)return;
    if(clusterRef.current)map.removeLayer(clusterRef.current);
    const cluster=L.markerClusterGroup({maxClusterRadius:55,spiderfyOnMaxZoom:true,showCoverageOnHover:false,zoomToBoundsOnClick:true,disableClusteringAtZoom:16,chunkedLoading:true,iconCreateFunction:c=>clusterIcon(c.getChildCount())});
    properties.forEach(p=>{const mk=L.marker([p.latitude,p.longitude],{icon:propIcon(p,p.id===activeId)});mk.on('click',()=>handleSelect(p));cluster.addLayer(mk);});
    clusterRef.current=cluster;
    if(viewMode==='mapa')map.addLayer(cluster);
  },[properties,activeId,viewMode]);

  useEffect(()=>{
    const map=mapInst.current;if(!map)return;
    if(viewMode==='mapa'){
      if(heatRef.current&&map.hasLayer(heatRef.current))map.removeLayer(heatRef.current);
      if(clusterRef.current)map.addLayer(clusterRef.current);
    }else{
      if(clusterRef.current&&map.hasLayer(clusterRef.current))map.removeLayer(clusterRef.current);
      if(!heatRef.current)heatRef.current=new HeatClass();
      if(!map.hasLayer(heatRef.current))heatRef.current.addTo(map);
    }
  },[viewMode]);

  const handleSelect=useCallback(p=>{
    setActiveId(p.id);setSelected(p);
    if(mapInst.current)mapInst.current.setView([p.latitude,p.longitude],16,{animate:true});
    setTimeout(()=>{const el=document.getElementById(`c${p.id}`);if(el&&sidebarRef.current)sidebarRef.current.scrollTo({top:el.offsetTop-130,behavior:'smooth'});},80);
  },[]);

  const handleSaved=useCallback(p=>{
    setShowForm(false);cacheRef.current={};setBounds(b=>({...b}));
    if(mapInst.current)mapInst.current.setView([p.latitude,p.longitude],14,{animate:true});
  },[]);

  const avg=properties.length?Math.round(properties.reduce((s,p)=>s+p.price,0)/properties.length):0;

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      {/* HEADER */}
      <header style={{background:'#111827',color:'white',height:isMobile?54:62,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px',zIndex:100}}>
        <div style={{display:'flex',alignItems:'center',gap:9,flexShrink:0}}>
          <div style={{width:30,height:30,background:ACCENT,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16}}>I</div>
          <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:isMobile?16:18}}>Imob<span style={{color:ACCENT}}>Easy</span></span>
        </div>
        {!isMobile&&(
          <div style={{display:'flex',background:'rgba(255,255,255,.1)',borderRadius:10,padding:3,gap:2}}>
            {[{v:'mapa',l:'🗺 Mapa'},{v:'lifestyle',l:'✨ Estilo de Vida'}].map(({v,l})=>(
              <button key={v} onClick={()=>setViewMode(v)} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 16px',borderRadius:7,fontSize:13,fontWeight:600,border:'none',cursor:'pointer',fontFamily:"'Plus Jakarta Sans',sans-serif",transition:'all .18s',background:viewMode===v?'white':'transparent',color:viewMode===v?'#111827':'rgba(255,255,255,.6)'}}>{l}</button>
            ))}
          </div>
        )}
        <div style={{display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
          <div className="mtog">
            {['comprador','corretor'].map(m=>(
              <button key={m} className={`mtog-btn ${userMode===m?'on':'off'}`} onClick={()=>setUserMode(m)} style={{fontSize:isMobile?11:12}}>{m.charAt(0).toUpperCase()+m.slice(1)}</button>
            ))}
          </div>
          {userMode==='corretor'&&!isMobile&&<button className="btn-p" onClick={()=>setShowForm(true)} style={{fontSize:13,padding:'7px 15px',borderRadius:9}}>+ Cadastrar</button>}
        </div>
      </header>

      {/* CORPO */}
      <div style={{flex:1,display:'flex',overflow:'hidden',position:'relative'}}>
        <div ref={mapRef} style={{flex:1}}/>

        {/* Pill modo (mobile) */}
        {isMobile&&(
          <div style={{position:'absolute',top:12,left:'50%',transform:'translateX(-50%)',zIndex:700}}>
            <div className="pill">
              {[{v:'mapa',l:'🗺 Mapa'},{v:'lifestyle',l:'✨ Estilo de Vida'}].map(({v,l})=>(
                <button key={v} className={`pill-btn ${viewMode===v?'on':'off'}`} onClick={()=>setViewMode(v)}>{l}</button>
              ))}
            </div>
          </div>
        )}

        {/* ── FIX BUG 1: legenda posicionada corretamente ──
            - top ajustado por contexto (mobile vs desktop)
            - no desktop não sobrepõe a sidebar (está no espaço do mapa)
            - pointer-events:none para não bloquear o mapa            */}
        {viewMode==='lifestyle'&&(
          <div className="ls-legend" style={{
            top: isMobile ? 68 : 16,
          }}>
            <p style={{fontSize:11,fontWeight:700,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.6px',marginBottom:10}}>Perfil da Região</p>
            {Object.entries(PROFILES).map(([k,m])=>(
              <div key={k} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
                <div style={{width:12,height:12,borderRadius:3,background:m.color,flexShrink:0}}/>
                <span style={{fontSize:12,color:'#374151',fontWeight:500}}>{m.emoji} {m.label}</span>
              </div>
            ))}
            <p style={{fontSize:10,color:'#9ca3af',lineHeight:1.5,marginTop:10,paddingTop:10,borderTop:'1px solid #f3f4f6'}}>
              Baseado em escolas, faculdades, bares e mercados.
            </p>
          </div>
        )}

        {/* Badge cluster */}
        {viewMode==='mapa'&&properties.length>10&&(
          <div style={{position:'absolute',bottom:isMobile?106:46,left:12,zIndex:700,background:'rgba(255,255,255,.92)',backdropFilter:'blur(4px)',borderRadius:9,padding:'5px 10px',fontSize:11,fontWeight:600,color:'#374151',boxShadow:'0 2px 8px rgba(0,0,0,.1)'}}>
            🔵 {properties.length} imóveis · clustering ativo
          </div>
        )}

        {/* FAB corretor mobile */}
        {userMode==='corretor'&&isMobile&&(
          <button onClick={()=>setShowForm(true)} style={{position:'absolute',bottom:108,right:16,zIndex:700,width:52,height:52,borderRadius:'50%',background:ACCENT,color:'white',fontSize:26,border:'none',cursor:'pointer',boxShadow:'0 4px 18px rgba(255,106,61,.45)',display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
        )}

        {/* SIDEBAR desktop */}
        {!isMobile&&(
          <div ref={sidebarRef} className="scr" style={{width:350,flexShrink:0,background:'white',borderLeft:'1px solid #f3f4f6',display:'flex',flexDirection:'column',overflowY:'auto'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,padding:'12px 14px',borderBottom:'1px solid #f3f4f6'}}>
              <div style={{textAlign:'center'}}><p style={{fontSize:17,fontWeight:700,color:ACCENT}}>{loading?'…':properties.length}</p><p style={{fontSize:10,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.5px'}}>Imóveis</p></div>
              <div style={{textAlign:'center'}}><p style={{fontSize:17,fontWeight:700,color:ACCENT}}>{loading?'…':(properties.length?fmtShort(avg):'–')}</p><p style={{fontSize:10,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.5px'}}>Preço médio</p></div>
            </div>
            <div style={{padding:'13px 16px 10px',borderBottom:'1px solid #f3f4f6',background:'white',position:'sticky',top:0,zIndex:10}}>
              <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
                {[{v:'all',l:'Todos'},{v:'apartamento',l:'Apto'},{v:'casa',l:'Casa'}].map(({v,l})=>(
                  <button key={v} className="fpill" onClick={()=>setFilters(f=>({...f,type:v}))} style={{background:filters.type===v?ACCENT:'white',borderColor:filters.type===v?ACCENT:'#e5e7eb',color:filters.type===v?'white':'#374151'}}>{l}</button>
                ))}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:12,color:'#9ca3af',whiteSpace:'nowrap'}}>Até:</span>
                <input type="range" min={150_000} max={MAX_PRICE} step={50_000} value={Math.min(filters.maxPrice,MAX_PRICE)} onChange={e=>setFilters(f=>({...f,maxPrice:parseInt(e.target.value)}))} style={{flex:1}}/>
                <span style={{fontSize:12,fontWeight:700,color:ACCENT,minWidth:50,textAlign:'right'}}>{filters.maxPrice>=MAX_PRICE?'Todos':fmtShort(filters.maxPrice)}</span>
              </div>
            </div>
            <div style={{padding:'12px 13px 24px'}}>
              {loading&&<div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'40px 0',gap:10,color:'#9ca3af'}}><span className="spin"/><span style={{fontSize:13}}>Carregando imóveis…</span></div>}
              {!loading&&properties.slice(0,40).map(p=><PropCard key={p.id} p={p} active={p.id===activeId} onClick={()=>handleSelect(p)}/>)}
              {!loading&&properties.length>40&&<div style={{background:'#f9fafb',borderRadius:12,padding:12,textAlign:'center'}}><p style={{fontSize:12,color:'#6b7280'}}>Mostrando 40 de {properties.length}.</p><p style={{fontSize:11,color:'#9ca3af',marginTop:2}}>Use filtros ou explore o mapa.</p></div>}
              {!loading&&properties.length===0&&<div style={{textAlign:'center',padding:'48px 16px',color:'#9ca3af'}}><p style={{fontSize:32,marginBottom:10}}>🏚</p><p style={{fontWeight:600,color:'#6b7280',fontSize:14}}>Nenhum imóvel encontrado</p></div>}
            </div>
          </div>
        )}

        {/* BOTTOM SHEET mobile */}
        {isMobile&&<BottomSheet items={properties} activeId={activeId} onSelect={handleSelect} filters={filters} setFilters={setFilters}/>}
      </div>

      {/* MODAIS */}
      {selected&&<PropModal p={selected} onClose={()=>{setSelected(null);setActiveId(null);}}/>}
      {showForm&&<AddForm onClose={()=>setShowForm(false)} onSaved={handleSaved}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
